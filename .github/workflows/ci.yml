name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['20', '22']
        include:
          - os: windows-latest
            node-version: '22'
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  verify-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify pack
        run: pnpm verify:pack

  edge-smoke:
    # rfc-ssr-platform §2.3: the production dist must stream a document
    # through the Web-stream path with every Node builtin import forbidden
    # (the module-graph property WinterCG runtimes enforce for real).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Edge smoke test
        run: pnpm test:edge

  bench-smoke:
    # The benchmark suite rots silently when it isn't run: the sigx adapter's
    # import broke in #202 and nobody noticed until #214. This job is a
    # correctness gate, not a timing gate — `verify` proves every framework
    # adapter still builds an equivalent tree, and the quick suite proves the
    # adapters load and render. bench:ssr:quick does NOT pass --enforce, so
    # check-regression only prints its delta table (expect "worse than +25%"
    # notes: a CI runner is slower than whatever machine recorded the
    # baseline). Timing enforcement stays local — and even under --enforce,
    # check-regression skips it on a machine-fingerprint mismatch.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify cross-framework output equivalence
        run: pnpm --filter @sigx/benchmarks verify

      - name: Quick benchmark suite
        run: pnpm bench:ssr:quick

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
          # Tell codecov which PR this upload belongs to. On a pull_request event
          # checkout leaves a detached merge ref the CLI cannot derive the PR from,
          # so uploads landed with pullid: null — no PR, no base, hence no patch
          # diff and no codecov/patch status, which is a REQUIRED check: every PR
          # deadlocked on "Expected — Waiting for status to be reported" (#227).
          # Empty on push events, so main's diff-against-parent path is unchanged.
          override_pr: ${{ github.event.pull_request.number }}
