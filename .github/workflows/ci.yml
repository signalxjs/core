name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # The main ruleset's merge queue runs required checks on merge_group refs —
  # without this trigger, queued PRs wait forever for checks that never start.
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['20', '22']
        include:
          - os: windows-latest
            node-version: '22'
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # docs/ecosystem.json drives the consumer fan-out in release.yml and the
      # release ORDER in docs/ecosystem-release.md. A package added here that
      # never reaches the manifest silently never reaches a consumer's catalog.
      - name: Verify ecosystem manifest
        run: pnpm verify:ecosystem

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  verify-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify pack
        run: pnpm verify:pack

  edge-smoke:
    # rfc-ssr-platform §2.3: the production dist must stream a document
    # through the Web-stream path with every Node builtin import forbidden
    # (the module-graph property WinterCG runtimes enforce for real).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Edge smoke test
        run: pnpm test:edge

  hydration-smoke:
    # #377: hydration has no success signal in a prod dist — both mismatch
    # warnings are __DEV__-gated, so a page that bailed to a full client
    # re-render still WORKS and reports nothing. This job asks the question
    # directly: every `<!--$c:N-->` marker the server sent must still be in
    # the live DOM after hydration (a bail's removeSSRRange takes the nested
    # markers with it), over real production builds of the root-walk app and
    # the islands app. See scripts/hydration-smoke.mjs for what the oracle
    # does and does not catch.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Chromium only: the gate needs a real browser to run hydration, and
      # nothing here is browser-specific.
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Hydration smoke
        run: pnpm smoke:hydration

  deploy-smoke-cloudflare:
    # rfc-deploy §6: the built reference apps under REAL workerd (Miniflare,
    # programmatic dispatchFetch — no ports, no login). Streamed document
    # markers, a static asset through the assets config, a server-fn POST
    # through the inlined registry.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy smoke (workerd)
        run: pnpm deploy-smoke:cloudflare

  deploy-smoke-node:
    # rfc-deploy §6: the external build under `node --conditions production`
    # — the SAME assertion set as the workerd tier ("serves identically" is
    # the exit criterion). The Node path must stay cross-platform.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy smoke (node)
        run: pnpm deploy-smoke:node

  deploy-smoke-deno:
    # rfc-deploy §6: the BUNDLED build under deno (linux-only per the RFC —
    # the cross-platform story is deploy-smoke-node's job).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy smoke (deno)
        run: pnpm deploy-smoke:deno

  deploy-smoke-bun:
    # rfc-deploy §6: the EXTERNAL build under bun (the same dist/ the node
    # server uses — export conditions honored via --conditions=production).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy smoke (bun)
        run: pnpm deploy-smoke:bun

  deploy-smoke-vercel:
    # rfc-deploy §6: STRUCTURAL verification of the generated Build Output
    # API v3 layout + the render function's fetch export invoked directly
    # under Node (WinterCG code; exactly what Vercel's launcher calls). No
    # emulation, no live deploys.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy smoke (vercel, structural)
        run: pnpm deploy-smoke:vercel

  deploy-smoke-netlify:
    # rfc-deploy §6: STRUCTURAL verification of the generated Frameworks API
    # layout + the function's default export invoked directly under Node.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy smoke (netlify, structural)
        run: pnpm deploy-smoke:netlify

  bench-smoke:
    # The benchmark suite rots silently when it isn't run: the sigx adapter's
    # import broke in #202 and nobody noticed until #214. This job is a
    # correctness gate, not a timing gate — `verify` proves every framework
    # adapter still builds an equivalent tree, and the quick suite proves the
    # adapters load and render. bench:ssr:quick does NOT pass --enforce, so
    # check-regression only prints its delta table (expect "worse than +25%"
    # notes: a CI runner is slower than whatever machine recorded the
    # baseline). Timing enforcement stays local — and even under --enforce,
    # check-regression skips it on a machine-fingerprint mismatch.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify cross-framework output equivalence
        run: pnpm --filter @sigx/benchmarks verify

      - name: Quick benchmark suite
        run: pnpm bench:ssr:quick

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
