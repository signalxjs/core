name: Bundle size

on:
  pull_request:
    branches: [main]
  # The `size` job is a required check on main, so it must also report on the
  # merge-queue ref — a required context that never runs there wedges every
  # queued PR in AWAITING_CHECKS (#336).
  merge_group:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      # PR events: the diffing/commenting action (needs a PR context).
      - if: github.event_name == 'pull_request'
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_manager: pnpm
          script: pnpm size
          build_script: build

      # Merge-queue ref: no PR to comment on — enforce the budgets directly.
      - if: github.event_name == 'merge_group'
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm size
