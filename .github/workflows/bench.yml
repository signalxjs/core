name: Bench

# Informational only: benchmark numbers from shared runners are too noisy to
# gate on, so this never runs with --enforce and never fails on regressions.
# Trigger it manually and inspect the uploaded artifacts. (The micro suite's
# per-bench correctness guards DO fail hard — a bench that cannot prove it is
# doing its work must not report a number.)
on:
  workflow_dispatch:

jobs:
  bench-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # The benchmarks run erasable TS directly via `node` (type stripping).
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Quick SSR bench (informational)
        run: pnpm bench:ssr:quick

      - name: Request-path micro bench (informational)
        run: pnpm bench:micro

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: |
            benchmarks/results/quick-latest.json
            benchmarks/results/micro-latest.json
