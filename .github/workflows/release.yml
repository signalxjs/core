name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual re-run for a missed/partial publish: publish.js skips versions
  # already on the registry, so a dispatch publishes exactly the package
  # versions main currently declares that npm doesn't have — intended for
  # right after a tag run missed a package, before any new version bumps
  # land. Dispatches are restricted to main (guard on publish-npm); the
  # GitHub-release job is tag-only (guard below).
  workflow_dispatch:

# Top-level permissions are intentionally minimal. Each job declares what it
# actually needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    # Tag pushes always publish; manual dispatches only from main — never a
    # feature branch.
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # OIDC for npm trusted publishing; read-only on contents.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing needs npm >= 11.5.1. Node 24 ships npm 11.x,
      # but pin to latest so we never silently fall behind a publish-side fix.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify pack
        run: pnpm verify:pack

      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: node scripts/publish.js --provenance

  github-release:
    needs: publish-npm
    # Only tag pushes create a GitHub release — a workflow_dispatch re-publish
    # has no tag to release (github.ref_name would be a branch name).
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Only this job needs write — npm publish already happened above.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q true; then
            gh release edit "$TAG" --draft=false --latest
          else
            gh release create "$TAG" --generate-notes --latest
          fi

  # After a successful publish, ping every consumer repo's core-sync.yml so each
  # opens its own "align with core X.Y" PR. Purely additive: it runs only after
  # publish-npm succeeds and per-repo dispatch failures are swallowed, so it can
  # never affect the npm publish or the GitHub release above. See
  # docs/MAINTAINERS.md → "Notifying consumer repos" for the token setup.
  notify-consumers:
    needs: publish-npm
    # Tag releases only — a manual workflow_dispatch re-publish has no version tag
    # to broadcast (github.ref_name would be a branch name like `main`).
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Authenticates with a PAT (ECOSYSTEM_DISPATCH_TOKEN), never GITHUB_TOKEN —
    # which cannot dispatch to other repos anyway — so needs no repo permissions.
    permissions: {}
    steps:
      - name: Fan out core-released to consumers
        env:
          GH_TOKEN: ${{ secrets.ECOSYSTEM_DISPATCH_TOKEN }}
          # The tag that triggered this release, e.g. v0.13.0 -> 0.13.0
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ECOSYSTEM_DISPATCH_TOKEN not set — skipping consumer dispatch."
            echo "(Consumers still pick up this release via core-sync.yml's weekly cron.)"
            exit 0
          fi
          VER="${VERSION#v}"
          for repo in router store use lynx ssg pulse; do
            echo "Dispatching core-released ($VER) to signalxjs/$repo"
            gh api "repos/signalxjs/$repo/dispatches" \
              -f event_type=core-released \
              -F "client_payload[version]=$VER" \
            || echo "  (dispatch to $repo failed — is core-sync.yml present & the token scoped for it?)"
          done
