name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual re-run for a missed/partial publish: publish.js skips versions
  # already on the registry, so a dispatch publishes exactly the package
  # versions main currently declares that npm doesn't have — intended for
  # right after a tag run missed a package, before any new version bumps
  # land. Dispatches are restricted to main (guard on publish-npm); the
  # GitHub-release job is tag-only (guard below).
  workflow_dispatch:

# Top-level permissions are intentionally minimal. Each job declares what it
# actually needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    # Tag pushes always publish; manual dispatches only from main — never a
    # feature branch.
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # OIDC for npm trusted publishing; read-only on contents.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing needs npm >= 11.5.1. Node 24 ships npm 11.x,
      # but pin to latest so we never silently fall behind a publish-side fix.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify pack
        run: pnpm verify:pack

      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: node scripts/publish.js --provenance

  github-release:
    needs: publish-npm
    # Only tag pushes create a GitHub release — a workflow_dispatch re-publish
    # has no tag to release (github.ref_name would be a branch name).
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Only this job needs write — npm publish already happened above.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q true; then
            gh release edit "$TAG" --draft=false --latest
          else
            gh release create "$TAG" --generate-notes --latest
          fi
