# Netlify config for the resume example (rfc-deploy §4.5) — user-owned; the
# adapter prints this starter when absent, never writes it. The SSR function
# itself needs no entry here: it ships through the Frameworks API channel
# (.netlify/v1/functions, generated by `pnpm build:netlify`).
[build]
  publish = "dist-netlify/client"
  command = "npm run build:netlify"
