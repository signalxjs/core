<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalX Storefront</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f6f5f2;
        color: #1e1e1e;
        margin: 0;
        line-height: 1.5;
      }
      .shop { max-width: 980px; margin: 0 auto; padding: 1.5rem; }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        background: #f6f5f2ee;
        backdrop-filter: blur(4px);
        padding: 0.75rem 0;
        z-index: 2;
      }
      header h1 { margin: 0; font-size: 1.4rem; }
      .badge {
        background: #1e1e1e;
        color: white;
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        font-variant-numeric: tabular-nums;
      }
      .tagline { color: #555; max-width: 64ch; }
      .deal {
        background: linear-gradient(120deg, #fde68a, #fca5a5);
        border-radius: 14px;
        padding: 1rem 1.25rem;
        margin: 1rem 0 1.5rem;
      }
      .deal h3, .deal p { margin: 0.25rem 0; }
      .category { margin: 2rem 0; }
      .category h2 small { color: #777; font-weight: normal; font-size: 0.7em; margin-left: 0.5rem; }
      .category.skeleton { opacity: 0.5; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.9rem;
      }
      .card {
        background: white;
        border: 1px solid #e8e6e0;
        border-radius: 12px;
        padding: 0.9rem;
        text-align: center;
      }
      .card .art { font-size: 2rem; }
      .card h4 { margin: 0.4rem 0 0.1rem; }
      .card .price { margin: 0 0 0.6rem; color: #666; }
      button {
        font: inherit;
        font-size: 0.9em;
        padding: 0.4rem 0.8rem;
        border: 1px solid #1e1e1e;
        background: #1e1e1e;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover { background: #000; }
      footer {
        margin: 3rem 0 5rem;
        padding: 1.5rem;
        background: white;
        border-radius: 14px;
        border: 1px solid #e8e6e0;
      }
      .newsletter { display: flex; gap: 0.6rem; }
      .newsletter input {
        font: inherit;
        flex: 1;
        max-width: 320px;
        padding: 0.4rem 0.7rem;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      .thanks { font-size: 1.1em; }
      .hud {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        width: 300px;
        max-height: 40vh;
        overflow: auto;
        background: #111;
        color: #9f9;
        font: 12px/1.5 ui-monospace, monospace;
        border-radius: 10px;
        padding: 0.6rem 0.9rem;
        z-index: 3;
      }
      .hud summary { cursor: pointer; }
      .hud ol { margin: 0.4rem 0 0; padding-left: 1.4rem; }
      .hint { font-size: 0.8em; color: #7a5c00; }
    </style>
  </head>
  <body>
    <div id="app"><!--ssr-outlet--></div>
    <script type="module" src="/src/entry-client.ts"></script>
  </body>
</html>
