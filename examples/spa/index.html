<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/signalx-logo-150x119.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalX SPA</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fafafa;
        color: #222;
        margin: 0;
        line-height: 1.5;
      }
      header {
        background: white;
        border-bottom: 1px solid #eee;
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1.25rem;
      }
      header img { width: 40px; height: auto; }
      header strong { font-size: 1.05rem; }
      nav { margin-left: auto; display: flex; gap: 0.25rem; }
      nav a {
        padding: 0.4rem 0.85rem;
        border-radius: 6px;
        color: #444;
        text-decoration: none;
        font-size: 0.95rem;
      }
      nav a:hover { background: #f0f0f0; }
      nav a.active { background: #222; color: white; }
      main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem; }
      h1 { margin: 0 0 0.5rem; }
      .card {
        background: white;
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 1.5rem;
        margin-top: 1rem;
      }
      button {
        font: inherit;
        padding: 0.4rem 0.85rem;
        border: 1px solid #222;
        background: #222;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #000; }
      input[type="text"], input:not([type]), input[type="number"], select, textarea {
        font: inherit;
        padding: 0.4rem 0.6rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: white;
      }
      input[type="text"]:focus, input:not([type]):focus, select:focus, textarea:focus {
        outline: 2px solid #4a90e2;
        outline-offset: 1px;
      }
      textarea { font-family: inherit; resize: vertical; }
      code {
        background: #f3f3f3;
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
        font-size: 0.92em;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
