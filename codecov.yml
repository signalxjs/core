# Codecov config — https://docs.codecov.com/docs/codecovyml-reference
#
# Gates PRs on coverage of the lines they change, so a change that adds no test
# can't go green. Mirrors the org template (signalxjs/repo-template).
# The `coverage` job in ci.yml already uploads coverage to Codecov.

coverage:
  status:
    # Whole-project coverage: report only, never block. Project-level gates are
    # noisy (refactors, moved files, deleting tested code) — we enforce on the
    # patch instead, where new/changed code actually lives.
    project:
      default:
        informational: true

    # Patch coverage = % of the lines THIS PR changed that are covered. This is
    # the gate. 80% leaves room for trivial/untestable lines while still failing
    # a change that adds no test. Raise toward 100% if you want it tighter.
    patch:
      default:
        target: 80%
        threshold: 0%
        informational: false

# Don't post coverage status before the upload arrives. after_n_builds is the
# number of coverage uploads per commit — this repo uploads once, from the
# `coverage` job in ci.yml. Bump it if more upload sources are added.
codecov:
  notify:
    after_n_builds: 1
  require_ci_to_pass: true

# Inline annotations on the exact uncovered changed lines, right in the PR diff.
github_checks:
  annotations: true

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true # only comment when coverage actually changes
